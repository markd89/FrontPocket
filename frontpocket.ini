[settings]
# Voice to use at startup. Must match a key in the [voices] section below.
default_voice = alba

# Time between playing chunks in milliseconds 
sentence_gap_ms = 75

# Playback speed at startup. 1.0 = normal. Range: 0.5 – 3.0.
# Values other than 1.0 use pyrubberband for time-stretching (pitch-preserved).
default_speed = 1.0

# Server bind address and port. Use 127.0.0.1 to accept local connections only.
host = 127.0.0.1
port = 5562

# Seconds of silence before and after an !interruptwith message.
interrupt_pause = 1.0

# WAV file to play before the interrupt text (leave blank to disable).
# Example: interrupt_sound = ~/FrontPocket/sounds/notifiction.wav

interrupt_sound = ~/FrontPocket/sounds/notification.wav

# Number of chunks to pre-generate ahead of (and behind) the current position.
# Higher values reduce gaps between chunks but use more memory.
lookahead_chunks = 5

# Maximum chunk duration in seconds. Sentences longer than this are split on
# comma boundaries.
max_chunk_duration = 15

# Language code passed to pysbd for sentence segmentation.
# en = English. Other supported codes: de, fr, es, it, ru, pl, and more.
language = en

# Log level: ERROR (minimal), INFO (default), DEBUG (verbose, writes chunk files).
log_level = INFO

# Directory to write per-chunk debug text files when log_level = DEBUG.
# Leave blank to disable. Files are cleared at server startup.
# Example: debug_dir = ~/FrontPocket/logs
debug_dir =


[voices]
# Built-in voices — included with the TTS engine, no file path needed.
alba = alba
anna = anna
azelma = azelma
bill_boerst = bill_boerst
caro_davy = caro_davy
charles = charles
cosette = cosette
eponine = eponine
eve = eve
fantine = fantine
george = george
jane = jane
jean = jean
javert = javert
marius = marius
mary = mary
michael = michael
paul = paul
peter_yearsley = peter_yearsley
stuart_bell = stuart_bell
vera = vera


# Custom voices — provide the full path to your .safetensors embedding file.
# Example:
# mary = ~/FrontPocket/voices/mary.safetensors

# Voices from Hugging Face can be referenced directly:
# Example:
# expresso = hf://kyutai/tts-voices/expresso/ex01-ex02_default_001_channel2_198s.wav

[Toolbar]
# Path to the fp client command.
fp_command = fp

# Toolbar button size in pixels.
button_size = 30

# Window opacity (0.0 = fully transparent, 1.0 = fully opaque).
window_opacity = 0.9

# Keep toolbar above all other windows.
stay_on_top = true

# Default position on screen (used if no saved position exists).
initial_x = 800
initial_y = 30

# Animate the voice/speed panel expanding and collapsing.
animation = true

# Show a confirmation dialog before quitting the toolbar.
confirm_quit = true

# Speed choices shown in the dropdown.
speed_choices = 1.0,1.1,1.2,1.4,1.6,1.8,2.0,0.75

# Optional: record command. If set, a record button appears in the toolbar.
# See https://github.com/markd89/wdictation for what I do with this.
# record = /usr/local/bin/myrecord.sh


[SpeedDefaults]
# Set a default speed for specific voices. Voice name must match [voices] key.
# Example:
# mary = 1.2
# alba = 1.1

# Re-send voice and speed to server every time Play is pressed.
# Keeps server in sync if it was restarted while the toolbar was running.
# Set to false to disable.
always_send_voice_speed = true





